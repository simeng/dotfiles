$discord = flatpak run com.discordapp.Discord

$youtubemusic = /usr/bin/chromium-browser --profile-directory=Default --app-id=--app-id=cinhimbnkkaeohfgghhklpknlkffjgod
$teams = /usr/bin/chromium-browser --profile-directory=Default --app-id=cifhbcnohmdccbgoicgdjpfamggdegmo

exec-once = [workspace 2] $terminal
exec-once = [workspace 2] $browser
exec-once = [workspace 1] $terminal
exec-once = [workspace 1] $discord
exec-once = [workspace 1] $youtubemusic
exec-once = [workspace 1] $teams

exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hash dbus-update-activation-environment 2>/dev/null && dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprland-session.target

